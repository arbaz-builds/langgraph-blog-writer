services:
  - type: web
    name: langgraph-blog-writer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:fastapi_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: TAVILY_API_KEY
        sync: false
